<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Holme Hale Prediction League</title>
<style>
  :root{
    --paper:#F4EFE2;
    --card:#FDFBF4;
    --ink:#1E2A23;
    --pitch:#0E5138;
    --pitch-deep:#0A3A28;
    --gold:#C9A227;
    --gold-soft:#E8D9A8;
    --line:#D8D0BC;
    --red:#B23A2F;
    --muted:#6E7A70;
    --ok:#1E7A45;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;
  }
  /* ---------- header ---------- */
  header{
    background:linear-gradient(160deg,var(--pitch-deep),var(--pitch));
    color:#F6F2E4;
    padding:26px 18px 22px;
    border-bottom:4px solid var(--gold);
  }
  .head-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:18px;}
  .trophy{flex:0 0 auto;width:58px;height:78px;}
  h1{
    font-size:clamp(1.25rem,3.5vw,2rem);
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.06em;
    line-height:1.15;
  }
  /* ---------- toolbar ---------- */
  .toolbar{
    max-width:980px;margin:14px auto 0;padding:0 18px;
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;
  }
  .save-state{font-size:.78rem;color:var(--muted);min-width:90px;}
  .save-state.busy{color:var(--gold);}
  .save-state.err{color:var(--red);}
  .admin-btn{
    border:1.5px solid var(--pitch);
    background:transparent;color:var(--pitch);
    font-weight:700;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;
    padding:7px 14px;border-radius:4px;cursor:pointer;
  }
  .admin-btn.on{background:var(--red);border-color:var(--red);color:#fff;}
  .pw-wrap{display:inline-flex;align-items:center;gap:6px;}
  .pw-box{
    width:120px;padding:6px 8px;font-size:.82rem;
    border:1.5px solid var(--pitch);border-radius:4px;background:#fff;color:var(--ink);
  }
  .pw-box:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .pw-err{font-size:.72rem;font-weight:700;color:var(--red);}
  /* ---------- layout ---------- */
  main{max-width:980px;margin:0 auto;padding:10px 18px 70px;}
  section{margin-top:34px;}
  .sec-head{
    display:flex;align-items:baseline;gap:12px;cursor:pointer;user-select:none;
    border-bottom:3px solid var(--pitch);padding-bottom:6px;
  }
  .sec-head h2{
    font-size:1.05rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--pitch);
  }
  .sec-head .count{font-size:.75rem;color:var(--muted);letter-spacing:.05em;}
  .sec-head .chev{margin-left:auto;color:var(--pitch);font-weight:900;transition:transform .2s;}
  section.closed .chev{transform:rotate(-90deg);}
  section.closed .sec-body{display:none;}
  .date-label{
    margin:22px 0 8px;font-size:.74rem;font-weight:800;letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted);
  }
  /* ---------- match card ---------- */
  .match{
    background:var(--card);
    border:1px solid var(--line);
    border-left:5px solid var(--pitch);
    border-radius:6px;
    margin-bottom:12px;
    box-shadow:0 1px 2px rgba(30,42,35,.07);
    overflow:hidden;
  }
  .match.locked{border-left-color:var(--gold);}
  .m-head{padding:12px 14px 10px;cursor:pointer;}
  .m-top{display:flex;align-items:center;gap:8px;}
  .m-meta{font-size:.72rem;color:var(--muted);letter-spacing:.04em;}
  .m-group{
    font-size:.66rem;font-weight:800;color:var(--pitch);
    border:1px solid var(--pitch);border-radius:3px;padding:1px 6px;letter-spacing:.1em;
  }
  .m-lock{
    margin-left:auto;font-size:.64rem;font-weight:800;letter-spacing:.14em;
    color:var(--red);border:1.5px solid var(--red);border-radius:3px;padding:2px 7px;
    transform:rotate(-2deg);display:none;
  }
  /* score row: team | box | v | box | team */
  .m-score{
    display:grid;
    grid-template-columns:1fr 52px 26px 52px 1fr;
    align-items:center;gap:8px;margin-top:8px;
  }
  .t-name{font-weight:900;font-size:clamp(.92rem,2.6vw,1.18rem);text-transform:uppercase;letter-spacing:.02em;}
  .t-name.away{text-align:right;}
  .vs{text-align:center;color:var(--muted);font-size:.8rem;font-weight:700;}
  .res-box{
    width:52px;height:46px;text-align:center;
    font-size:1.4rem;font-weight:900;font-family:inherit;
    border:2px solid var(--ink);border-radius:5px;background:#fff;color:var(--ink);
  }
  .res-box:disabled{background:var(--paper);border-color:var(--line);color:var(--ink);}
  .res-box::placeholder{color:#C9C2AE;font-weight:400;}
  /* prediction grid */
  .preds{
    display:grid;grid-template-columns:1fr 52px 26px 52px 1fr;
    align-items:center;gap:6px 8px;margin-top:10px;
    padding-top:8px;border-top:1px dashed var(--line);
  }
  .p-tag{
    font-size:.72rem;font-weight:800;color:var(--pitch);
    text-align:right;letter-spacing:.1em;
  }
  .p-pts{font-size:.7rem;font-weight:800;}
  .p-pts.s5{color:var(--ok);}
  .p-pts.s2{color:var(--gold);}
  .p-pts.s0{color:var(--red);}
  .pred-box{
    width:52px;height:34px;text-align:center;
    font-size:1rem;font-weight:700;
    border:1.5px solid var(--line);border-radius:4px;background:#fff;color:var(--ink);
  }
  .pred-box:focus,.res-box:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .pred-box:disabled{background:var(--paper);color:var(--muted);}
  /* overview */
  .m-body{display:none;border-top:1px solid var(--line);background:#FBF8EE;padding:14px 16px;font-size:.88rem;}
  .match.open .m-body{display:block;}
  .m-body h4{
    font-size:.72rem;text-transform:uppercase;letter-spacing:.16em;color:var(--pitch);
    margin:14px 0 4px;
  }
  .m-body h4:first-child{margin-top:0;}
  .m-body .team-sub{font-weight:800;font-style:italic;margin-top:6px;}
  .m-body ul{list-style:none;margin:2px 0 0;}
  .m-body li{padding-left:14px;position:relative;margin-top:2px;}
  .m-body li::before{content:"•";position:absolute;left:0;color:var(--gold);}
  .m-body .odds-line{margin-top:2px;}
  .m-body .placeholder{color:var(--muted);font-style:italic;}
  .tap-hint{font-size:.66rem;color:var(--muted);margin-top:8px;letter-spacing:.06em;}
  /* ---------- leaderboard ---------- */
  .board{
    background:var(--pitch-deep);color:#F6F2E4;border-radius:8px;
    padding:18px;margin-top:26px;border:1px solid var(--pitch);
  }
  .board h2{
    font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.14em;
    color:var(--gold);margin-bottom:10px;
  }
  table{width:100%;border-collapse:collapse;font-size:.9rem;}
  th{
    text-align:left;font-size:.66rem;text-transform:uppercase;letter-spacing:.14em;
    color:var(--gold-soft);padding:6px 8px;border-bottom:1px solid rgba(246,242,228,.25);
  }
  td{padding:8px;border-bottom:1px solid rgba(246,242,228,.12);}
  td.num,th.num{text-align:center;}
  .pos{color:var(--gold);font-weight:900;}
  .pname{font-weight:800;}
  .ptotal{font-weight:900;font-size:1.05rem;color:var(--gold);}
  .scoring-note{font-size:.7rem;color:rgba(246,242,228,.7);margin-top:8px;}
  .offline-note{
    max-width:980px;margin:10px auto 0;padding:8px 18px;font-size:.75rem;color:var(--red);display:none;
  }
  .board-scroll{overflow-x:auto;}
  @media (max-width:480px){
    .m-score,.preds{grid-template-columns:1fr 44px 20px 44px 1fr;}
    .res-box,.pred-box{width:44px;}
    .board{padding:14px 10px;}
    table{font-size:.82rem;}
    th{font-size:.58rem;letter-spacing:.06em;padding:5px 4px;}
    td{padding:7px 4px;}
    .hide-sm{display:none;}
    .ptotal{font-size:.95rem;}
  }
</style>
</head>

/* ---------------- state & storage ---------------- */
let state = { p:{}, r:{} };          // p[matchId][playerKey] = [h,a]; r[matchId] = [h,a]
let adminMode = false;
let adminPw = "";
let saveTimer = null;
let pendingPreds = {};
const resTimers = {};
const saveEl = document.getElementById("saveState");

async function loadState(){
  try{
    const res = await fetch("/api/league");
    if(!res.ok) throw 0;
    const s = await res.json();
    state = { p: s.p || {}, r: s.r || {} };
    setSave("Saved");
  }catch(e){
    document.getElementById("offlineNote").style.display = "block";
    setSave("Offline","err");
  }
}
function queueSave(){
  setSave("Saving\u2026","busy");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushPreds, 700);
}
async function flushPreds(){
  const updates = Object.values(pendingPreds);
  if(!updates.length){ setSave("Saved"); return; }
  pendingPreds = {};
  try{
    const res = await fetch("/api/league",{ method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ preds: updates }) });
    if(!res.ok) throw 0;
    setSave("Saved");
  }catch(e){
    for(const u of updates) pendingPreds[u.id+u.pk] = u;   // re-queue and retry
    setSave("Save failed \u2014 retrying","err");
    setTimeout(flushPreds, 4000);
  }
}
async function saveResult(id){
  setSave("Saving\u2026","busy");
  try{
    const res = await fetch("/api/league",{ method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ result:{ id:id, v: state.r[id] }, pw: adminPw }) });
    if(res.status===401){ setSave("Not authorised","err"); return; }
    if(!res.ok) throw 0;
    setSave("Saved");
  }catch(e){ setSave("Save failed","err"); }
}
function setSave(t,c){ saveEl.textContent = t; saveEl.className = "save-state"+(c?" "+c:""); }

/* ---------------- scoring ---------------- */
function outcome(h,a){ return h>a ? 1 : (h<a ? -1 : 0); }
function pointsFor(pred,res){
  if(!pred || pred[0]==="" || pred[1]==="" ) return null;
  const ph=+pred[0], pa=+pred[1], rh=+res[0], ra=+res[1];
  if(ph===rh && pa===ra) return 5;
  if(outcome(ph,pa)===outcome(rh,ra)) return 2;
  return 0;
}
function resultEntered(id){
  const r = state.r[id];
  return r && r[0]!=="" && r[1]!=="" && r[0]!=null && r[1]!=null;
}
const MONTHS = {June:5, July:6};
function koTime(m){
  const p = m.d.split(" ");                 // e.g. ["Thursday","11","June"]
  const t = m.tm.slice(0,-2).split(":");    // "8:00pm" -> ["8","00"]
  let h = +t[0]; const min = +t[1]; const ap = m.tm.slice(-2);
  if(ap==="pm" && h!==12) h += 12;
  if(ap==="am" && h===12) h = 0;
  return new Date(2026, MONTHS[p[2]], +p[1], h, min).getTime();
}
function kickedOff(m){ return Date.now() >= koTime(m); }

  const wrap = document.getElementById("rounds");
  let html = "";
  for(const r of [1,2,3]){
    const ms = MATCHES.filter(m=>m.r===r);
    html += '<section class="'+(r===1?"":"closed")+'" id="sec'+r+'">'
         +  '<div class="sec-head" onclick="toggleSec('+r+')"><h2>'+ROUND_NAMES[r]+'</h2>'
         +  '<span class="count">'+ms.length+' matches</span><span class="chev">&#9662;</span></div>'
         +  '<div class="sec-body">';
    let lastDate = "";
    for(const m of ms){
      if(m.d!==lastDate){ html += '<div class="date-label">'+m.d+'</div>'; lastDate = m.d; }
      html += matchCard(m);
    }
    html += '</div></section>';
  }
  wrap.innerHTML = html;
  for(const m of MATCHES) refreshMatch(m.id);
  renderBoard();
}

function matchCard(m){
  const ov = OVERVIEWS[m.id] || '<div class="placeholder">Pre-match analysis to follow nearer kick-off.</div>';
  let predRows = "";
  for(const p of PLAYERS){
    predRows +=
      '<div class="p-tag">'+p.name+'</div>'
    + '<input class="pred-box" id="p'+m.id+p.key+'h" maxlength="2" inputmode="numeric" placeholder="–" onclick="event.stopPropagation()" oninput="onPred('+m.id+',\''+p.key+'\')">'
    + '<div class="vs">–</div>'
    + '<input class="pred-box" id="p'+m.id+p.key+'a" maxlength="2" inputmode="numeric" placeholder="–" onclick="event.stopPropagation()" oninput="onPred('+m.id+',\''+p.key+'\')">'
    + '<div class="p-pts" id="pts'+m.id+p.key+'"></div>';
  }
  return '<div class="match" id="m'+m.id+'">'
   + '<div class="m-head" onclick="toggleMatch('+m.id+')">'
   +   '<div class="m-top"><span class="m-group">GRP '+m.g+'</span>'
   +   '<span class="m-meta">'+m.d+' &middot; '+m.tm+' BST &middot; '+clean(m.v)+'</span>'
   +   '<span class="m-lock" id="lock'+m.id+'"></span></div>'
   +   '<div class="m-score">'
   +     '<div class="t-name">'+clean(m.t1)+'</div>'
   +     '<input class="res-box" id="r'+m.id+'h" maxlength="2" inputmode="numeric" placeholder="·" onclick="event.stopPropagation()" oninput="onRes('+m.id+')">'
   +     '<div class="vs">v</div>'
   +     '<input class="res-box" id="r'+m.id+'a" maxlength="2" inputmode="numeric" placeholder="·" onclick="event.stopPropagation()" oninput="onRes('+m.id+')">'
   +     '<div class="t-name away">'+clean(m.t2)+'</div>'
   +   '</div>'
   +   '<div class="preds">'+predRows+'</div>'
   +   '<div class="tap-hint">Tap the card for the pre-match analysis</div>'
   + '</div>'
   + '<div class="m-body">'+ov+'</div>'
   + '</div>';
}

function digitsOnly(el){ el.value = el.value.replace(/[^0-9]/g,"").slice(0,2); }

function onPred(id,pk){
  const h = document.getElementById("p"+id+pk+"h");
  const a = document.getElementById("p"+id+pk+"a");
  digitsOnly(h); digitsOnly(a);
  if(!state.p[id]) state.p[id] = {};
  state.p[id][pk] = [h.value, a.value];
  pendingPreds[id+pk] = { id:id, pk:pk, v:[h.value, a.value] };
  queueSave();
}
function onRes(id){
  const h = document.getElementById("r"+id+"h");
  const a = document.getElementById("r"+id+"a");
  digitsOnly(h); digitsOnly(a);
  state.r[id] = [h.value, a.value];
  refreshMatch(id);
  renderBoard();
  clearTimeout(resTimers[id]);
  resTimers[id] = setTimeout(()=>saveResult(id), 700);
}

function refreshMatch(id){
  const m = MATCHES.find(x=>x.id===id);
  const done = resultEntered(id);
  const kicked = kickedOff(m);
  const lockPreds = done || kicked;
  const card = document.getElementById("m"+id);
  card.classList.toggle("locked", lockPreds);
  const badge = document.getElementById("lock"+id);
  if(done){ badge.textContent = "FULL TIME \u00B7 LOCKED"; badge.style.display = "inline-block"; }
  else if(kicked){ badge.textContent = "PREDICTIONS LOCKED"; badge.style.display = "inline-block"; }
  else { badge.style.display = "none"; }
  const rh = document.getElementById("r"+id+"h");
  const ra = document.getElementById("r"+id+"a");
  const r = state.r[id] || ["",""];
  if(document.activeElement!==rh) rh.value = r[0] ?? "";
  if(document.activeElement!==ra) ra.value = r[1] ?? "";
  rh.disabled = ra.disabled = !adminMode;
  for(const p of PLAYERS){
    const h = document.getElementById("p"+id+p.key+"h");
    const a = document.getElementById("p"+id+p.key+"a");
    const pr = (state.p[id]||{})[p.key] || ["",""];
    if(document.activeElement!==h) h.value = pr[0] ?? "";
    if(document.activeElement!==a) a.value = pr[1] ?? "";
    h.disabled = a.disabled = lockPreds;  // lock at kick-off or once result is in
    const ptsEl = document.getElementById("pts"+id+p.key);
    if(done){
      const pts = pointsFor(pr, state.r[id]);
      if(pts===null){ ptsEl.textContent = "no entry"; ptsEl.className = "p-pts s0"; }
      else { ptsEl.textContent = "+"+pts; ptsEl.className = "p-pts s"+pts; }
    } else { ptsEl.textContent = ""; }
  }
}

function renderBoard(){
  const rows = PLAYERS.map(p=>{
    let exact=0, outc=0, played=0, total=0;
    for(const m of MATCHES){
      if(!resultEntered(m.id)) continue;
      const pts = pointsFor((state.p[m.id]||{})[p.key], state.r[m.id]);
      if(pts===null) continue;
      played++;
      if(pts===5) exact++;
      else if(pts===2) outc++;
      total += pts;
    }
    return {name:p.name, exact, outc, played, total};
  }).sort((x,y)=> y.total-x.total || y.exact-x.exact);
  document.getElementById("boardBody").innerHTML = rows.map((r,i)=>
    '<tr><td class="pos">'+(i+1)+'</td><td class="pname">'+r.name+'</td>'
   +'<td class="num">'+r.exact+'</td><td class="num">'+r.outc+'</td>'
   +'<td class="num">'+r.played+'</td><td class="num ptotal">'+r.total+'</td></tr>'
  ).join("");
}

function toggleMatch(id){ document.getElementById("m"+id).classList.toggle("open"); }
function toggleSec(r){ document.getElementById("sec"+r).classList.toggle("closed"); }

const adminBtn = document.getElementById("adminBtn");
const pwWrap = document.getElementById("pwWrap");
const pwBox  = document.getElementById("pwBox");
const pwErr  = document.getElementById("pwErr");

function setAdmin(on){
  adminMode = on;
  if(!on) adminPw = "";
  adminBtn.textContent = "Results entry: " + (on ? "ON" : "off");
  adminBtn.classList.toggle("on", on);
  pwWrap.style.display = "none";
  pwBox.value = ""; pwErr.textContent = "";
  for(const m of MATCHES) refreshMatch(m.id);
}
adminBtn.addEventListener("click", function(){
  if(adminMode){ setAdmin(false); return; }
  const showing = pwWrap.style.display !== "none";
  pwWrap.style.display = showing ? "none" : "inline-flex";
  pwErr.textContent = "";
  if(!showing) pwBox.focus();
});
async function tryUnlock(){
  const pw = pwBox.value;
  pwErr.textContent = "Checking\u2026";
  try{
    const res = await fetch("/api/league",{ method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ auth:true, pw:pw }) });
    if(res.status===204){ adminPw = pw; setAdmin(true); }
    else { pwErr.textContent = "Wrong password"; pwBox.select(); }
  }catch(e){ pwErr.textContent = "Network error"; }
}
document.getElementById("pwGo").addEventListener("click", tryUnlock);
pwBox.addEventListener("keydown", e=>{ if(e.key==="Enter") tryUnlock(); });

setInterval(async ()=>{
  try{
    const res = await fetch("/api/league");
    if(res.ok){
      const s = await res.json();
      state = { p: s.p || {}, r: s.r || {} };
      for(const u of Object.values(pendingPreds)){            // keep unsaved local edits on top
        (state.p[u.id] ||= {})[u.pk] = u.v;
      }
    }
  }catch(e){}
  for(const m of MATCHES) refreshMatch(m.id);
  renderBoard();
}, 60000);

/* ---------------- boot ---------------- */
(async function(){
  await loadState();
  buildUI();
})();
</script>
</body>
</html>
